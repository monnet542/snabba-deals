<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snabba Deals - Top Trending Produkte</title>
    <meta name="description" content="Taeglich kuratierte Top-Deals und Trending-Produkte von Amazon">
    <meta property="og:title" content="Snabba Deals">
    <meta property="og:description" content="Taeglich kuratierte Top-Deals und Trending-Produkte">
    <meta property="og:type" content="website">
    <link rel="alternate" type="application/rss+xml" title="Snabba Deals RSS" href="feed.xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 20px; }
        header h1 { font-size: 2.2em; font-weight: 800; margin-bottom: 8px; }
        header p { color: #666; font-size: 1.1em; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 0; }
        .card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: transform 0.2s;
            text-decoration: none; color: inherit;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .card img { width: 100%; height: 200px; object-fit: contain; background: #fafafa; padding: 10px; }
        .card-body { padding: 16px; }
        .card-title { font-weight: 700; font-size: 0.95em; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-price { font-weight: 800; color: #e63946; font-size: 1.2em; }
        .card-rating { color: #f4a261; font-size: 0.9em; margin-top: 4px; }
        .date-section { font-size: 1.1em; font-weight: 700; color: #666; margin-top: 30px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        footer { text-align: center; padding: 40px; color: #aaa; font-size: 0.85em; }
    </style>
</head>
<body>
    <header>
        <h1>Snabba Deals</h1>
        <p>Taeglich kuratierte Top-Deals und Trending-Produkte</p>
    </header>
    <div class="container">
        $product_sections
    </div>
    <footer>
        <p>* Als Amazon-Partner verdiene ich an qualifizierten Verkaeufen.</p>
    </footer>
</body>
</html>
